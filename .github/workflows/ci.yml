name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BLACK_PATHS: >-
    sports_federation_public_site/models/public_flags.py
    sports_federation_public_site/controllers/public_competitions.py
    sports_federation_public_site/tests/test_public_site.py
    sports_federation_portal/models/federation_season_registration.py
    sports_federation_portal/controllers/main.py
    sports_federation_portal/tests/test_season_registration.py
    sports_federation_standings/tests/test_standings_result_filter.py
    sports_federation_venues/tests/test_gameday.py
  FLAKE8_PATHS: >-
    sports_federation_public_site/models/public_flags.py
    sports_federation_public_site/controllers/public_competitions.py
    sports_federation_public_site/tests/test_public_site.py
    sports_federation_portal/models/federation_season_registration.py
    sports_federation_portal/controllers/main.py
    sports_federation_portal/tests/test_season_registration.py
    sports_federation_standings/tests/test_standings_result_filter.py
    sports_federation_venues/tests/test_gameday.py

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check formatting with Black
        run: black --check $BLACK_PATHS

      - name: Run Flake8
        run: flake8 $FLAKE8_PATHS

  odoo-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose availability
        run: docker compose version

      - name: Run Odoo module tests
        run: |
          chmod +x ci/run_tests.sh
          bash ./ci/run_tests.sh \
            --module sports_federation_public_site \
            --module sports_federation_portal \
            --module sports_federation_standings \
            --module sports_federation_venues